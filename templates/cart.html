<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koszyk - HobbToys</title>
    <style>
        /* === RESET I ZMIENNE === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --bg-color: #f8f9fa;
            --text-color: #333;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 {
            font-size: 1.8rem;
            letter-spacing: 2px;
        }
        .back-btn {
            color: white;
            text-decoration: none;
            font-weight: bold;
            padding: 10px 20px;
            border: 2px solid white;
            border-radius: 5px;
            transition: background 0.3s, color 0.3s;
        }
        .back-btn:hover {
            background-color: white;
            color: var(--primary-color);
        }

        .container {
            padding: 40px 5%;
            max-width: 900px;
            margin: 0 auto;
        }
        .panel {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .panel h2 {
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #eee;
        }
        th {
            color: var(--primary-color);
        }
        .qty-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 3px;
            width: 26px;
            height: 26px;
            cursor: pointer;
            font-weight: bold;
        }
        .remove-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 3px;
            padding: 5px 12px;
            cursor: pointer;
        }
        .qty {
            display: inline-block;
            min-width: 30px;
            text-align: center;
            font-weight: bold;
        }

        .total-row td {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary-color);
            border-bottom: none;
        }

        .order-btn {
            margin-top: 25px;
            padding: 15px 40px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            transition: background 0.3s;
        }
        .order-btn:hover {
            background-color: #c0392b;
        }
        .message {
            margin-top: 15px;
            font-weight: bold;
            min-height: 24px;
        }
    </style>
</head>
<body>

    <header>
        <h1>🛒 Koszyk</h1>
        <a href="/" class="back-btn">← Wróć do sklepu</a>
    </header>

    <div class="container">
        <div class="panel">
            <h2>Twoje zamówienie</h2>
            <div id="cart-content">Ładowanie koszyka...</div>
            <button class="order-btn" id="orderBtn" onclick="placeOrder()" style="display:none">Złóż zamówienie</button>
            <div id="orderMessage" class="message"></div>
        </div>
    </div>

    <script>
        let productsById = {};

        function getCart() {
            return JSON.parse(localStorage.getItem('cart') || '{}');
        }

        function saveCart(cart) {
            localStorage.setItem('cart', JSON.stringify(cart));
        }

        async function loadCart() {
            const content = document.getElementById('cart-content');
            const cart = getCart();

            if (!Object.keys(cart).length) {
                content.innerHTML = '<p>Twój koszyk jest pusty.</p>';
                document.getElementById('orderBtn').style.display = 'none';
                return;
            }

            try {
                // Pobieramy aktualne dane produktów (nazwy i ceny) z API
                const response = await fetch('/api/products');
                const products = await response.json();
                productsById = {};
                products.forEach(p => productsById[p.produkt_id] = p);
                renderCart();
            } catch (error) {
                content.innerHTML = '<p>Błąd połączenia z serwerem.</p>';
                console.error(error);
            }
        }

        function renderCart() {
            const content = document.getElementById('cart-content');
            const cart = getCart();
            let total = 0;
            let rows = '';

            for (const [id, qty] of Object.entries(cart)) {
                const product = productsById[id];
                if (!product) continue; // produkt usunięty ze sklepu

                const price = parseFloat(product.cena);
                const value = price * qty;
                total += value;

                rows += `
                    <tr>
                        <td>${product.nazwa_gry}</td>
                        <td>${price.toFixed(2)} zł</td>
                        <td>
                            <button class="qty-btn" onclick="changeQty('${id}', -1)">−</button>
                            <span class="qty">${qty}</span>
                            <button class="qty-btn" onclick="changeQty('${id}', 1)">+</button>
                        </td>
                        <td>${value.toFixed(2)} zł</td>
                        <td><button class="remove-btn" onclick="removeItem('${id}')">Usuń</button></td>
                    </tr>
                `;
            }

            if (!rows) {
                content.innerHTML = '<p>Twój koszyk jest pusty.</p>';
                document.getElementById('orderBtn').style.display = 'none';
                return;
            }

            content.innerHTML = `
                <table>
                    <tr><th>Produkt</th><th>Cena</th><th>Liczba sztuk</th><th>Wartość</th><th></th></tr>
                    ${rows}
                    <tr class="total-row"><td colspan="3">Razem</td><td>${total.toFixed(2)} zł</td><td></td></tr>
                </table>
            `;
            document.getElementById('orderBtn').style.display = 'inline-block';
        }

        function changeQty(id, delta) {
            const cart = getCart();
            cart[id] = (cart[id] || 0) + delta;
            if (cart[id] <= 0) delete cart[id];
            saveCart(cart);
            renderCart();
        }

        function removeItem(id) {
            const cart = getCart();
            delete cart[id];
            saveCart(cart);
            renderCart();
        }

        async function placeOrder() {
            const message = document.getElementById('orderMessage');
            const token = localStorage.getItem('token');

            // Zamówienie musi być przypisane do konta - wymagane logowanie
            if (!token) {
                message.style.color = "#e74c3c";
                message.innerText = "Musisz się zalogować, aby złożyć zamówienie. Przekierowanie...";
                setTimeout(() => { window.location.href = '/login_page'; }, 2000);
                return;
            }

            const cart = getCart();
            const items = Object.entries(cart).map(([product_id, quantity]) => ({ product_id, quantity }));

            message.style.color = "#3498db";
            message.innerText = "Składanie zamówienia...";

            try {
                const response = await fetch('/api/orders', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ items: items })
                });
                const data = await response.json();

                if (response.status === 401) {
                    message.style.color = "#e74c3c";
                    message.innerText = "Sesja wygasła. Zaloguj się ponownie...";
                    setTimeout(() => { window.location.href = '/login_page'; }, 2000);
                    return;
                }

                if (response.ok) {
                    // Sukces - czyścimy koszyk, zamówienie widnieje na koncie użytkownika
                    localStorage.removeItem('cart');
                    message.style.color = "#27ae60";
                    message.innerText = data.message + " Znajdziesz je na swoim koncie w sekcji Moje zamówienia.";
                    renderCart();
                } else {
                    // Np. niewystarczający stan magazynowy (409)
                    message.style.color = "#e74c3c";
                    message.innerText = data.message;
                }
            } catch (error) {
                message.style.color = "#e74c3c";
                message.innerText = "Błąd połączenia z serwerem.";
                console.error(error);
            }
        }

        loadCart();
    </script>
</body>
</html>
